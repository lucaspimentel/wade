name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            archive: zip
          - os: ubuntu-latest
            rid: linux-x64
            archive: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore Wade.slnx

    - name: Test
      run: dotnet test Wade.slnx -c Release --verbosity normal

    - name: Publish
      run: dotnet publish src/Wade/Wade.csproj -c Release -r ${{ matrix.rid }} -o dist --self-contained

    - name: Copy documentation
      shell: pwsh
      run: |
        Copy-Item LICENSE dist/ -ErrorAction SilentlyContinue
        Copy-Item README.md dist/

    - name: Create archive (Windows)
      if: matrix.archive == 'zip'
      shell: pwsh
      run: |
        Compress-Archive -Path dist/* -DestinationPath wade-${{ matrix.rid }}.zip

    - name: Create archive (Linux)
      if: matrix.archive == 'tar.gz'
      run: |
        cd dist
        tar -czf ../wade-${{ matrix.rid }}.tar.gz *
        cd ..

    - name: Generate checksum
      shell: pwsh
      run: |
        $hash = Get-FileHash -Path wade-${{ matrix.rid }}.${{ matrix.archive }} -Algorithm SHA256
        "$($hash.Hash)  wade-${{ matrix.rid }}.${{ matrix.archive }}" | Out-File -FilePath checksum-${{ matrix.rid }}.txt -Encoding ascii

    - name: Upload artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: wade-${{ matrix.rid }}
        path: |
          wade-${{ matrix.rid }}.${{ matrix.archive }}
          checksum-${{ matrix.rid }}.txt

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Download artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1

    - name: Combine checksums
      run: |
        cat wade-win-x64/checksum-win-x64.txt > checksums.txt
        cat wade-linux-x64/checksum-linux-x64.txt >> checksums.txt

    - name: Determine version
      id: version
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        fi

    - name: Create Release
      uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: v${{ steps.version.outputs.version }}
        draft: false
        prerelease: ${{ contains(steps.version.outputs.version, '-') }}
        generate_release_notes: true
        files: |
          wade-win-x64/wade-win-x64.zip
          wade-linux-x64/wade-linux-x64.tar.gz
          checksums.txt
