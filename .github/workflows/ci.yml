name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore Wade.slnx

    - name: Build
      run: dotnet build Wade.slnx -c Release --no-restore

    - name: Test
      run: dotnet test Wade.slnx -c Release --no-build --verbosity normal

    - name: Publish
      run: dotnet publish src/Wade/Wade.csproj -c Release -r ${{ matrix.rid }} -o publish

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wade-${{ matrix.rid }}
        path: publish/
